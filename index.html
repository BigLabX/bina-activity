<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แผนกิจกรรมของบีน่า</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #ff6eb4;
      --purple: #b97cff;
      --yellow: #ffd166;
      --mint:   #0bcf8e;
      --blue:   #5bbfff;
      --coral:  #ff9a8b;
      --ocean:  #3bc9db;
      --bg:     #fdf0fb;
      --text:   #4a3f5c;
      --sub:    #a890bf;
    }

    /* ── Page background ─────────────────────────────── */
    body {
      font-family: 'Mitr', sans-serif;
      font-size: 18px;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 10% 10%, rgba(255,110,180,.15) 0%, transparent 45%),
        radial-gradient(ellipse at 90% 85%, rgba(91,191,255,.15) 0%, transparent 45%),
        radial-gradient(ellipse at 60% 40%, rgba(185,124,255,.09) 0%, transparent 40%);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 18px 60px;
    }

    /* ── Sea creature background layer ───────────────── */
    #sea-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      transition: transform 0.12s ease-out;
    }
    .sea-deco {
      position: absolute;
      font-size: 2.8rem;
      opacity: .22;
      user-select: none;
      line-height: 1;
      will-change: transform;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.06));
    }
    #sd-fish    { top:18%;  left:2%;   font-size:2.4rem; animation: bobFloat 6s ease-in-out infinite; }
    #sd-puffer  { top:42%;  right:3%;  font-size:2.2rem; animation: creatureDrift 8s ease-in-out infinite; }
    #sd-dolphin { top:6%;   left:28%;  font-size:3rem;   animation: arcSwim 10s ease-in-out infinite; }
    #sd-crab    { bottom:7%; left:4%;  font-size:2.4rem; animation: skitter 5s ease-in-out infinite; }
    #sd-octopus { bottom:14%;right:5%; font-size:2.6rem; animation: pulseGrow 5s ease-in-out infinite; }
    #sd-whale   { top:58%;  left:48%;  font-size:5rem;   opacity:.05; animation: slowMove 22s ease-in-out infinite; }
    #sd-shell   { bottom:4%;left:38%;  font-size:2rem;   animation: gentleBob 7s ease-in-out infinite; }
    #sd-starfish{ top:28%;  right:1%;  font-size:2.2rem; animation: spinSlow 14s linear infinite; }
    #sd-squid   { top:55%;  left:1%;   font-size:2rem;   animation: creatureDrift 9s ease-in-out infinite reverse; }
    #sd-turtle  { bottom:11%;right:13%;font-size:2.4rem; animation: slowMove 16s ease-in-out infinite; }
    #sd-coral   { bottom:2%;left:18%;  font-size:2rem;   opacity:.18; animation: gentleBob 9s ease-in-out infinite; }
    #sd-seahorse{ top:72%;  right:28%; font-size:1.8rem; animation: bobFloat 7s ease-in-out infinite reverse; }

    @keyframes bobFloat     { 0%,100%{transform:translateY(0) rotate(-5deg);}  50%{transform:translateY(-24px) rotate(5deg);} }
    @keyframes creatureDrift{ 0%,100%{transform:translate(0,0);}  33%{transform:translate(16px,-18px);}  66%{transform:translate(-12px,10px);} }
    @keyframes arcSwim      { 0%,100%{transform:translate(0,0);}  50%{transform:translate(28px,-26px);} }
    @keyframes skitter      { 0%,100%{transform:translateX(0);}   30%{transform:translateX(18px) scaleX(-1);}  70%{transform:translateX(-14px);} }
    @keyframes pulseGrow    { 0%,100%{transform:scale(1);}        50%{transform:scale(1.22) rotate(8deg);} }
    @keyframes slowMove     { 0%,100%{transform:translate(0,0);}  50%{transform:translate(38px,-18px);} }
    @keyframes gentleBob    { 0%,100%{transform:translateY(0) rotate(8deg);}  50%{transform:translateY(-14px) rotate(-6deg);} }
    @keyframes spinSlow     { from{transform:rotate(0deg);}  to{transform:rotate(360deg);} }

    /* ── Overlay layers ──────────────────────────────── */
    #click-layer, #confetti-layer { position:fixed; inset:0; pointer-events:none; z-index:999; }

    .click-bubble {
      position:absolute; border-radius:50%; border:3px solid;
      pointer-events:none;
      animation:bubbleRise 1.2s ease-out forwards;
    }
    @keyframes bubbleRise {
      0%  { transform:scale(0) translate(-50%,-50%); opacity:.9; }
      60% { opacity:.6; }
      100%{ transform:scale(1.6) translate(-50%,-120%); opacity:0; }
    }

    .confetti-piece {
      position:absolute; width:10px; height:10px; border-radius:2px;
      pointer-events:none;
      animation:confettiFall var(--dur) ease-in forwards;
    }
    @keyframes confettiFall {
      0%  { transform:translate(0,0) rotate(0deg) scale(1); opacity:1; }
      80% { opacity:1; }
      100%{ transform:translate(var(--tx),var(--ty)) rotate(var(--rot)) scale(.4); opacity:0; }
    }

    .uni-spark {
      position:fixed; font-size:1.2rem; pointer-events:none; z-index:1000;
      animation:sparkFly var(--dur) ease-out forwards;
    }
    @keyframes sparkFly {
      0%  { transform:translate(-50%,-50%) scale(0) rotate(0deg); opacity:1; }
      50% { opacity:1; }
      100%{ transform:translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1) rotate(var(--rot)); opacity:0; }
    }

    .swim-fish {
      position:fixed; font-size:2.8rem; top:var(--y);
      pointer-events:none; z-index:1; opacity:.55;
      animation:swimAcross var(--dur) linear forwards;
    }
    @keyframes swimAcross {
      from{ transform:translateX(var(--from)); }
      to  { transform:translateX(var(--to)); }
    }

    /* ── Header ──────────────────────────────────────── */
    .header { position:relative; z-index:1; text-align:center; margin-bottom:28px; }
    .unicorn {
      font-size:5rem; display:inline-block; cursor:pointer;
      animation:unicornBob 3.5s ease-in-out infinite;
      filter:drop-shadow(0 4px 12px rgba(255,110,180,.35));
      transition:transform .1s; user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .unicorn:active{ transform:scale(.88); }
    @keyframes unicornBob {
      0%,100%{ transform:translateY(0) rotate(-4deg) scale(1); }
      50%     { transform:translateY(-16px) rotate(4deg) scale(1.06); }
    }

    .header h1 {
      font-family: 'Mitr', sans-serif;
      font-weight: 700;
      font-size: 3rem;
      line-height: 1.2;
      color: var(--text);
    }
    .header h1 .name { color:var(--pink); text-shadow:3px 3px 0 rgba(255,110,180,.18); }
    .rainbow-text {
      background:linear-gradient(90deg,#ff6eb4,#ffd166,#06d6a0,#74b9ff,#c77dff,#ff6eb4);
      background-size:300% auto;
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
      animation:rainbowShift 3.5s linear infinite;
    }
    @keyframes rainbowShift { to{ background-position:300% center; } }

    .header .sub {
      font-size:.86rem; color:var(--sub); font-weight:600;
      margin-top:6px; letter-spacing:.06em;
    }
    .age-badge {
      display:inline-block; margin-top:12px;
      background:linear-gradient(135deg,var(--pink),var(--purple));
      color:white; padding:6px 22px; border-radius:999px;
      font-size:.95rem; font-weight:700; letter-spacing:.04em;
      box-shadow:0 4px 18px rgba(255,110,180,.38);
    }

    /* ── Dashboard ───────────────────────────────────── */
    .dashboard {
      position:relative; z-index:2;
      width:100%; max-width:660px;
      background:white; border-radius:38px;
      box-shadow:0 12px 56px rgba(185,124,255,.18), 0 2px 10px rgba(0,0,0,.04);
      overflow:hidden;
    }

    /* ── Week nav ────────────────────────────────────── */
    .week-nav {
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 20px;
      background:linear-gradient(135deg,#ffb8d9,#d4a8ff);
    }
    .nav-btn {
      background:rgba(255,255,255,.45); border:none; color:#7a3b8a;
      width:46px; height:46px; border-radius:50%; cursor:pointer;
      font-size:1.6rem; font-weight:700; font-family:'Mitr',sans-serif;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 2px 10px rgba(0,0,0,.1);
      transition:background .2s, transform .15s; line-height:1;
    }
    .nav-btn:hover:not(:disabled){ background:rgba(255,255,255,.65); transform:scale(1.14); }
    .nav-btn:disabled{ opacity:.28; cursor:default; }
    .week-label { font-family:'Mitr',sans-serif; font-weight:600; font-size:1rem; color:#6a1b7a; }

    /* ── Day chips ───────────────────────────────────── */
    .week-row-wrapper { padding:20px 14px 13px; background:#fdf5ff; border-bottom:2px dashed #ecd5ff; }
    .week-row { display:flex; gap:6px; justify-content:space-between; }

    .day-chip {
      flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
      padding:9px 4px 8px; border-radius:18px; cursor:pointer;
      position:relative; overflow:hidden;
      transition:background .15s; user-select:none; -webkit-tap-highlight-color:transparent;
    }
    .day-chip:hover:not(.out-of-range){ background:#f5e0ff; }
    .day-chip.selected {
      background:linear-gradient(160deg,#ff6eb4,#c77dff);
      box-shadow:0 5px 18px rgba(255,110,180,.42);
    }
    .day-chip.out-of-range{ opacity:.18; cursor:default; pointer-events:none; }
    .day-chip.today:not(.selected){ animation:todayGlow 2.2s ease-in-out infinite; }
    @keyframes todayGlow {
      0%,100%{ box-shadow:0 0 0 0 rgba(255,110,180,.45); }
      50%     { box-shadow:0 0 0 9px rgba(255,110,180,0); }
    }

    .day-name { font-size:.65rem; font-weight:700; color:#c0a0d0; }
    .day-chip.selected .day-name { color:rgba(255,255,255,.8); }
    .day-num { font-family:'Fredoka One',cursive; font-size:1.45rem; color:var(--text); line-height:1; }
    .day-chip.selected .day-num { color:white; }
    .day-chip.today .day-num { color:var(--pink); }
    .day-chip.selected.today .day-num { color:white; }
    .dot-row { height:8px; display:flex; gap:3px; align-items:center; justify-content:center; }
    .done-dot { width:6px; height:6px; border-radius:50%; background:#80e0a0; }
    .day-chip.selected .done-dot { background:rgba(255,255,255,.85); }
    .today-spark { font-size:.6rem; line-height:1; }

    /* Chip ripple & pop */
    .ripple {
      position:absolute; border-radius:50%;
      background:rgba(255,110,180,.28); pointer-events:none;
      animation:rippleExpand .55s ease-out forwards;
    }
    @keyframes rippleExpand { from{transform:scale(0);opacity:1;} to{transform:scale(6);opacity:0;} }
    @keyframes chipPop {
      0%  { transform:scale(1)   translateY(0); }
      40% { transform:scale(1.2) translateY(-4px); }
      100%{ transform:scale(1)   translateY(0); }
    }
    .day-chip.popping{ animation:chipPop .28s cubic-bezier(.36,.07,.19,.97); }

    /* Week slide */
    @keyframes slideFromRight{ from{transform:translateX(55px);opacity:0;} to{transform:translateX(0);opacity:1;} }
    @keyframes slideFromLeft { from{transform:translateX(-55px);opacity:0;} to{transform:translateX(0);opacity:1;} }
    .week-row.from-right{ animation:slideFromRight .3s cubic-bezier(.25,.46,.45,.94); }
    .week-row.from-left { animation:slideFromLeft  .3s cubic-bezier(.25,.46,.45,.94); }

    /* ── Activity section ────────────────────────────── */
    .activity-section { padding:24px 16px 8px; }
    .date-label { font-family:'Mitr',sans-serif; font-weight:700; font-size:1.2rem; color:var(--purple); margin-bottom:16px; padding-left:4px; }
    .activity-cards { display:flex; gap:13px; }

    /* Card animations */
    @keyframes slideUp {
      from{ transform:translateY(30px) scale(.95); opacity:0; }
      to  { transform:translateY(0)    scale(1);   opacity:1; }
    }
    @keyframes wobble {
      0%,100%{ transform:rotate(0deg)    translateY(0); }
      20%    { transform:rotate(-2.5deg) translateY(-6px); }
      40%    { transform:rotate(2.5deg)  translateY(-9px); }
      60%    { transform:rotate(-1.5deg) translateY(-6px); }
      80%    { transform:rotate(1.5deg)  translateY(-3px); }
    }
    .activity-card.wobbling{ animation:wobble .5s ease; }

    .activity-card {
      flex:1; border-radius:26px; padding:18px 12px 14px;
      display:flex; flex-direction:column; align-items:center; gap:7px;
      position:relative; overflow:hidden; cursor:default;
      transition:box-shadow .22s ease;
    }
    .activity-card::before {
      content:''; position:absolute; top:-20px; right:-20px;
      width:70px; height:70px; border-radius:50%; opacity:.22;
    }
    .activity-card.morning{ background:linear-gradient(160deg,#fff8e1,#fff0c4); border:2.5px solid #ffe082; }
    .activity-card.morning::before{ background:#ffd166; }
    .activity-card.midday { background:linear-gradient(160deg,#e6faf2,#cef5e5); border:2.5px solid #9ee8c4; }
    .activity-card.midday::before { background:#06d6a0; }
    .activity-card.evening{ background:linear-gradient(160deg,#eef3ff,#dde8ff); border:2.5px solid #aac0ff; }
    .activity-card.evening::before{ background:#74b9ff; }
    .activity-card.done   { background:linear-gradient(160deg,#efffef,#d6fae2) !important; border-color:#8ee0a0 !important; }

    .slot-label  { font-size:.72rem; font-weight:700; color:#b0a0c0; }
    .activity-icon { font-size:2.8rem; line-height:1; filter:drop-shadow(0 3px 6px rgba(0,0,0,.1)); }
    .activity-name { font-size:.9rem; font-weight:600; color:var(--text); text-align:center; line-height:1.4; }

    /* Done button */
    .done-btn {
      margin-top:4px; width:100%; padding:7px 4px; border-radius:13px; border:none;
      font-family:'Mitr',sans-serif; font-size:.76rem; font-weight:700; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:4px; letter-spacing:.03em;
      transition:background .2s, transform .1s, box-shadow .2s;
    }
    .done-btn:active{ transform:scale(.92); }
    .done-btn.not-done{ background:rgba(0,0,0,.06); color:#b0a0c0; }
    .done-btn.not-done:hover{ background:rgba(255,110,180,.13); color:var(--pink); }
    .done-btn.is-done{ background:linear-gradient(135deg,#a0e8b0,#4ec96e); color:white; box-shadow:0 3px 12px rgba(78,201,110,.38); }

    /* SVG checkmark */
    .check-icon{ width:15px; height:15px; flex-shrink:0; }
    .check-path{ stroke-dasharray:24; stroke-dashoffset:24; }
    .check-path.drawn{ animation:drawStroke .4s ease forwards; }
    @keyframes drawStroke{ from{stroke-dashoffset:24;} to{stroke-dashoffset:0;} }

    /* Burst dots */
    .burst-dot {
      position:absolute; width:9px; height:9px; border-radius:50%; pointer-events:none;
      animation:burstOut .6s ease-out forwards;
    }
    @keyframes burstOut {
      0%  { transform:translate(-50%,-50%) scale(1.4); opacity:1; }
      100%{ transform:translate(var(--tx),var(--ty)) scale(0); opacity:0; }
    }

    /* ── Daily message ───────────────────────────────── */
    .daily-msg {
      margin-top:16px; text-align:center;
      font-size:.9rem; font-weight:500; color:var(--sub);
      animation:fadeIn .5s ease;
    }
    @keyframes fadeIn{ from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:none;} }

    /* ── Progress ────────────────────────────────────── */
    .progress-section{ padding:18px 16px 24px; }
    .progress-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .p-label{ font-size:.76rem; font-weight:700; color:var(--sub); letter-spacing:.04em; }
    .p-count{ font-family:'Fredoka One',cursive; font-size:.96rem; color:var(--purple); }
    .progress-track{ background:#f3e5ff; border-radius:999px; height:14px; overflow:hidden; position:relative; }
    .progress-fill {
      height:100%; background:linear-gradient(90deg,var(--pink),var(--purple));
      border-radius:999px; transition:width .7s cubic-bezier(.25,.46,.45,.94);
      position:relative; min-width:0;
    }
    .progress-fill::after {
      content:'🐟'; position:absolute; right:-4px; top:50%;
      transform:translateY(-50%); font-size:.9rem; line-height:1;
    }

    /* ── Ocean wave ──────────────────────────────────── */
    .ocean-wave { position:relative; z-index:1; width:100%; max-width:660px; margin-top:-2px; line-height:0; }
    .ocean-wave svg{ width:100%; height:auto; display:block; }

    /* ── Responsive ──────────────────────────────────── */
    @media(max-width:420px){
      body{ font-size:16px; }
      .header h1{ font-size:2.4rem; }
      .activity-cards{ flex-direction:column; }
      .unicorn{ font-size:4rem; }
      #sea-layer{ display:none; }
    }
  </style>
</head>
<body>

<!-- ── Sea creatures ──────────────────────────────────── -->
<div id="sea-layer">
  <div class="sea-deco" id="sd-fish">🐠</div>
  <div class="sea-deco" id="sd-puffer">🐡</div>
  <div class="sea-deco" id="sd-dolphin">🐬</div>
  <div class="sea-deco" id="sd-crab">🦀</div>
  <div class="sea-deco" id="sd-octopus">🐙</div>
  <div class="sea-deco" id="sd-whale">🐳</div>
  <div class="sea-deco" id="sd-shell">🐚</div>
  <div class="sea-deco" id="sd-starfish">⭐</div>
  <div class="sea-deco" id="sd-squid">🦑</div>
  <div class="sea-deco" id="sd-turtle">🐢</div>
  <div class="sea-deco" id="sd-coral">🪸</div>
  <div class="sea-deco" id="sd-seahorse">🦭</div>
</div>

<!-- ── Overlay layers ─────────────────────────────────── -->
<div id="click-layer"></div>
<div id="confetti-layer"></div>

<!-- ── Header ─────────────────────────────────────────── -->
<div class="header">
  <div><div class="unicorn" id="unicorn" title="กดฉันสิ!">🦄</div></div>
  <h1><span class="name">ของบีน่า</span><br><span class="rainbow-text">ตารางกิจกรรมประจำวัน</span></h1>
  <div class="sub">🌊 แผนกิจกรรม · จนถึงวันเกิดครบ 2 ขวบ 🌊</div>
  <div class="age-badge" id="ageBadge">⭐ อายุ: 1 ปี 9 เดือน</div>
</div>

<!-- ── Dashboard ──────────────────────────────────────── -->
<div class="dashboard">
  <div class="week-nav">
    <button class="nav-btn" id="prevBtn" onclick="navigateWeek(-1)">‹</button>
    <span class="week-label" id="weekLabel"></span>
    <button class="nav-btn" id="nextBtn" onclick="navigateWeek(1)">›</button>
  </div>

  <div class="week-row-wrapper">
    <div class="week-row" id="weekRow"></div>
  </div>

  <div class="activity-section">
    <div class="date-label" id="dateLabel"></div>
    <div class="activity-cards" id="activityCards"></div>
    <div class="daily-msg" id="dailyMsg"></div>
  </div>

  <div class="progress-section">
    <div class="progress-header">
      <span class="p-label">🎀 ความคืบหน้าโดยรวม</span>
      <span class="p-count" id="progressText">0 / 91 วัน</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>
</div>

<!-- ── Ocean wave ─────────────────────────────────────── -->
<div class="ocean-wave">
  <svg viewBox="0 0 660 54" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,20 C80,42 160,0 240,22 C320,44 400,4 480,24 C560,44 620,14 660,26 L660,54 L0,54 Z" fill="#c4e8ff" opacity="0.55"/>
    <path d="M0,32 C90,14 180,48 270,28 C360,8 450,46 540,30 C590,20 630,38 660,28 L660,54 L0,54 Z" fill="#a0d8ef" opacity="0.45"/>
  </svg>
</div>

<script>
// ─── Data (Thai) ──────────────────────────────────────────────────────────────
const BIRTH = new Date(2024, 6, 30);
const START = new Date(2026, 3, 30);
const END   = new Date(2026, 6, 29);
const TOTAL = 91, WEEKS = 13;

const MORNING = [
  { name:"เล่นตัวต่อ",     icon:"🧱" },
  { name:"จัดรูปทรง",      icon:"🔷" },
  { name:"จิ๊กซอว์ง่ายๆ",  icon:"🧩" },
  { name:"ดินน้ำมัน",       icon:"🟡" },
];
const MIDDAY = [
  { name:"ระบายสีด้วยนิ้ว", icon:"🎨" },
  { name:"เล่นน้ำ",          icon:"💧" },
  { name:"เล่นลูกบอล",       icon:"⚽" },
  { name:"เต้นรำ",           icon:"💃" },
  { name:"เดินเล่นนอกบ้าน", icon:"🌿" },
];
const EVENING = [
  { name:"อ่านหนังสือภาพ",  icon:"📖" },
  { name:"ร้องเพลงกล่อม",   icon:"🎵" },
  { name:"เล่นสมมุติ",       icon:"🍳" },
  { name:"ไซโลโฟน",         icon:"🎼" },
];

const MESSAGES = [
  "บีน่าเก่งมากเลย! ⭐",
  "สำรวจโลกต่อไปนะลูก! 🌊",
  "วันนี้จะเป็นวันวิเศษมาก! 🦄",
  "เรียนรู้และเติบโตทุกวัน! 🌸",
  "การผจญภัยรออยู่แล้วนะบีน่า! 🐠",
  "บีน่าทำให้ทุกวันสดใสขึ้น! 🌈",
  "วันนี้สนุกมากเลยบีน่า! 🎉",
  "นักสำรวจน้อยกำลังมา! 🐢",
  "บีน่าเยี่ยมมากเลย! 💫",
  "ทุกวันคือการค้นพบใหม่! 🔍",
  "บีน่าทำได้ดีมากเลยลูก! 🌺",
  "เรียนรู้อย่างมีความสุขนะบีน่า! 🎨",
  "ทะเลแห่งความสนุกรออยู่! 🐬",
  "ส่องแสงเหมือนดาวเลย! ✨",
];

const SHORT_DAYS = ["อา","จ","อ","พ","พฤ","ศ","ส"];
const FULL_DAYS  = ["วันอาทิตย์","วันจันทร์","วันอังคาร","วันพุธ","วันพฤหัสบดี","วันศุกร์","วันเสาร์"];
const SHORT_MONS = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
const FULL_MONS  = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];

const BURST_COLS  = ["#ff6eb4","#b97cff","#ffd166","#0bcf8e","#5bbfff","#ff9a8b","#ffb347","#c77dff"];
const SWIM_FISH   = ["🐟","🐠","🐡","🦈","🐬"];
const SPARK_ICONS = ["⭐","✨","💫","🌟","🎀","💎","🌈"];

// ─── Helpers ──────────────────────────────────────────────────────────────────
const dateKey = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const parseKey = k => { const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); };
const addDays  = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const dayIdx   = k => Math.round((parseKey(k)-START)/86400000);
const weekOf   = k => Math.max(0,Math.min(WEEKS-1,Math.floor(dayIdx(k)/7)));
const rand     = (a,b) => a+Math.random()*(b-a);

function getActivity(k) {
  const i=dayIdx(k);
  if(i<0||i>=TOTAL) return null;
  return { morning:MORNING[i%MORNING.length], midday:MIDDAY[i%MIDDAY.length], evening:EVENING[i%EVENING.length] };
}
function getAge(k) {
  const d=parseKey(k);
  let m=(d.getFullYear()-BIRTH.getFullYear())*12+d.getMonth()-BIRTH.getMonth();
  if(d.getDate()<BIRTH.getDate()) m--;
  const y=Math.floor(m/12), mo=m%12;
  if(mo===0) return `${y} ปี`;
  if(y===0)  return `${mo} เดือน`;
  return `${y} ปี ${mo} เดือน`;
}
function getMessage(k) { return MESSAGES[dayIdx(k)%MESSAGES.length]; }

// localStorage
const dKey    = (k,s) => `bsched_th_${k}_${s}`;
const isDone  = (k,s) => localStorage.getItem(dKey(k,s))==='1';
const setDone = (k,s,v) => v?localStorage.setItem(dKey(k,s),'1'):localStorage.removeItem(dKey(k,s));
const doneCnt = k => ['morning','midday','evening'].filter(s=>isDone(k,s)).length;
const fullDone= k => doneCnt(k)===3;
function totalDone(){ let n=0; for(let i=0;i<TOTAL;i++) if(fullDone(dateKey(addDays(START,i)))) n++; return n; }

// ─── State ────────────────────────────────────────────────────────────────────
const startKey=dateKey(START), endKey=dateKey(END), todayKey=dateKey(new Date());
let selected=todayKey<startKey?startKey:todayKey>endKey?startKey:todayKey;
let weekIdx=weekOf(selected);

// ─── Render: week ─────────────────────────────────────────────────────────────
function renderWeek(slideDir){
  const row=document.getElementById('weekRow');
  document.getElementById('prevBtn').disabled=weekIdx===0;
  document.getElementById('nextBtn').disabled=weekIdx===WEEKS-1;

  const ws=addDays(START,weekIdx*7), we=addDays(ws,6), ce=we>END?END:we;
  const beYear = ws.getFullYear()+543; // พ.ศ.
  document.getElementById('weekLabel').textContent=
    `${ws.getDate()} ${SHORT_MONS[ws.getMonth()]} – ${ce.getDate()} ${SHORT_MONS[ce.getMonth()]} ${beYear}`;

  row.innerHTML='';
  for(let i=0;i<7;i++){
    const d=addDays(ws,i), k=dateKey(d);
    const oor=k<startKey||k>endKey, dc=!oor?doneCnt(k):0, isToday=k===todayKey;

    const chip=document.createElement('div');
    chip.className='day-chip'+(k===selected?' selected':'')+(isToday?' today':'')+(oor?' out-of-range':'');
    chip.dataset.key=k;

    let dotHtml='<div class="dot-row">';
    if(!oor) for(let s=0;s<dc;s++) dotHtml+='<span class="done-dot"></span>';
    if(isToday&&dc===0) dotHtml+='<span class="today-spark">✨</span>';
    dotHtml+='</div>';

    chip.innerHTML=`<span class="day-name">${SHORT_DAYS[d.getDay()]}</span><span class="day-num">${d.getDate()}</span>${dotHtml}`;
    if(!oor) chip.addEventListener('click',()=>onChipClick(chip,k));
    row.appendChild(chip);
  }
  if(slideDir){
    row.classList.remove('from-right','from-left');
    void row.offsetWidth;
    row.classList.add(slideDir>0?'from-right':'from-left');
  }
}

// ─── Render: cards ────────────────────────────────────────────────────────────
function renderCards(animate){
  const container=document.getElementById('activityCards');
  const activity=getActivity(selected);
  const d=parseKey(selected);
  const beYear=d.getFullYear()+543;

  document.getElementById('dateLabel').textContent=
    `${FULL_DAYS[d.getDay()]}ที่ ${d.getDate()} ${FULL_MONS[d.getMonth()]} ${beYear} 🌈`;
  document.getElementById('ageBadge').textContent=`⭐ อายุ: ${getAge(selected)}`;
  document.getElementById('dailyMsg').textContent=getMessage(selected);

  if(!activity){container.innerHTML='';return;}

  const slots=[
    {key:'morning',label:'เช้า',     emoji:'🌅',data:activity.morning,cls:'morning'},
    {key:'midday', label:'กลางวัน',  emoji:'☀️', data:activity.midday, cls:'midday'},
    {key:'evening',label:'เย็น',     emoji:'🌙',data:activity.evening,cls:'evening'},
  ];

  container.innerHTML='';
  slots.forEach((slot,idx)=>{
    const done=isDone(selected,slot.key);
    const card=document.createElement('div');
    card.className=`activity-card ${slot.cls}${done?' done':''}`;

    card.innerHTML=`
      <span class="slot-label">${slot.emoji} ${slot.label}</span>
      <span class="activity-icon">${slot.data.icon}</span>
      <span class="activity-name">${slot.data.name}</span>
      <button class="done-btn ${done?'is-done':'not-done'}" data-slot="${slot.key}">
        ${done?makeBtnInner(false):'🌟 ทำแล้ว!'}
      </button>`;

    card.addEventListener('mouseenter',()=>{
      if(card.classList.contains('wobbling')) return;
      card.classList.add('wobbling');
      card.addEventListener('animationend',()=>card.classList.remove('wobbling'),{once:true});
    });
    card.querySelector('.done-btn').addEventListener('click',e=>onDoneClick(e.currentTarget,card,slot.key));
    container.appendChild(card);

    if(animate){
      card.style.opacity='0';
      card.style.animation=`slideUp .4s cubic-bezier(.34,1.56,.64,1) ${idx*90}ms forwards`;
      card.addEventListener('animationend',()=>{ card.style.animation=''; card.style.opacity='1'; },{once:true});
    }
  });
}

function makeBtnInner(withAnim){
  return `<svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline class="check-path${withAnim?' drawn':''}" points="4,13 9,18 20,6" stroke-dasharray="24" stroke-dashoffset="${withAnim?24:0}"/>
  </svg> เสร็จแล้ว! 🎉`;
}

// ─── Progress ─────────────────────────────────────────────────────────────────
function renderProgress(){
  const n=totalDone();
  document.getElementById('progressText').textContent=`${n} / ${TOTAL} วัน`;
  document.getElementById('progressFill').style.width=`${(n/TOTAL)*100}%`;
}

// ─── Chip click ───────────────────────────────────────────────────────────────
function onChipClick(chip,k){
  if(k===selected) return;
  chip.classList.remove('popping'); void chip.offsetWidth; chip.classList.add('popping');

  const r=document.createElement('span'); r.className='ripple';
  const {width,height}=chip.getBoundingClientRect(), sz=Math.max(width,height);
  r.style.cssText=`width:${sz}px;height:${sz}px;left:${width/2-sz/2}px;top:${height/2-sz/2}px`;
  chip.appendChild(r); r.addEventListener('animationend',()=>r.remove(),{once:true});

  selected=k;
  document.querySelectorAll('.day-chip').forEach(c=>c.classList.toggle('selected',c.dataset.key===selected));
  renderCards(true);
}

// ─── Done click ───────────────────────────────────────────────────────────────
function onDoneClick(btn,card,slot){
  const was=isDone(selected,slot);
  setDone(selected,slot,!was);
  if(!was){
    btn.className='done-btn is-done';
    btn.innerHTML=makeBtnInner(true);
    requestAnimationFrame(()=>{ const p=btn.querySelector('.check-path'); if(p) p.classList.add('drawn'); });
    card.classList.add('done');
    spawnBurst(btn,card);
    if(fullDone(selected)) setTimeout(()=>spawnConfetti(),150);
  } else {
    btn.className='done-btn not-done'; btn.textContent='🌟 ทำแล้ว!';
    card.classList.remove('done');
  }
  renderWeek(null);
  renderProgress();
}

// ─── Burst particles ──────────────────────────────────────────────────────────
function spawnBurst(btn,card){
  const br=btn.getBoundingClientRect(), cr=card.getBoundingClientRect();
  const cx=br.left-cr.left+br.width/2, cy=br.top-cr.top+br.height/2;
  for(let i=0;i<8;i++){
    const angle=(i/8)*Math.PI*2-Math.PI/2, dist=30+Math.random()*22;
    const dot=document.createElement('span'); dot.className='burst-dot';
    dot.style.cssText=`background:${BURST_COLS[i]};left:${cx}px;top:${cy}px;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px`;
    card.appendChild(dot); dot.addEventListener('animationend',()=>dot.remove(),{once:true});
  }
}

// ─── Confetti ─────────────────────────────────────────────────────────────────
function spawnConfetti(){
  const layer=document.getElementById('confetti-layer');
  const colors=['#ff6eb4','#ffd166','#0bcf8e','#5bbfff','#c77dff','#ff9a8b','#ffb347','#80cbc4'];
  for(let i=0;i<55;i++){
    const el=document.createElement('div'); el.className='confetti-piece';
    const dur=rand(1.2,2.4),tx=rand(-160,160),ty=rand(200,520),rot=rand(-540,540);
    el.style.cssText=`
      left:${rand(10,90)}vw;top:${rand(-10,-5)}vh;
      background:${colors[i%colors.length]};
      width:${rand(7,12)}px;height:${rand(7,12)}px;
      border-radius:${Math.random()>.5?'50%':'3px'};
      --dur:${dur}s;--tx:${tx}px;--ty:${ty}px;--rot:${rot}deg;
      animation-delay:${rand(0,.4)}s;`;
    layer.appendChild(el);
    el.addEventListener('animationend',()=>el.remove(),{once:true});
  }
}

// ─── Click bubbles ────────────────────────────────────────────────────────────
const bubbleColors=['#ff6eb4','#b97cff','#5bbfff','#0bcf8e','#ffd166','#ff9a8b'];
document.addEventListener('click',e=>{
  if(e.target.closest('.day-chip,.nav-btn,.done-btn,.unicorn')) return;
  const layer=document.getElementById('click-layer');
  const size=rand(22,44), col=bubbleColors[Math.floor(Math.random()*bubbleColors.length)];
  const bub=document.createElement('div'); bub.className='click-bubble';
  bub.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;width:${size}px;height:${size}px;border-color:${col};box-shadow:0 0 8px ${col}55;`;
  layer.appendChild(bub); bub.addEventListener('animationend',()=>bub.remove(),{once:true});
});

// ─── Unicorn sparkles ─────────────────────────────────────────────────────────
document.getElementById('unicorn').addEventListener('click',()=>{
  const rect=document.getElementById('unicorn').getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  for(let i=0;i<18;i++){
    const angle=(i/18)*Math.PI*2;
    const dist=rand(80,170);
    const el=document.createElement('div'); el.className='uni-spark';
    el.textContent=SPARK_ICONS[i%SPARK_ICONS.length];
    const dur=rand(.7,1.2), rot=rand(-360,360);
    el.style.cssText=`left:${cx}px;top:${cy}px;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;--dur:${dur}s;--rot:${rot}deg;animation-delay:${rand(0,.15)}s;`;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove(),{once:true});
  }
});

// ─── Swimming fish ────────────────────────────────────────────────────────────
function spawnSwimFish(){
  const goRight=Math.random()>.5;
  const fish=document.createElement('div'); fish.className='swim-fish';
  const emoji=SWIM_FISH[Math.floor(Math.random()*SWIM_FISH.length)];
  fish.textContent=emoji;
  const dur=rand(6,12);
  fish.style.cssText=`--y:${rand(10,85)}vh;--dur:${dur}s;--from:${goRight?'-120px':'calc(100vw + 120px)'};--to:${goRight?'calc(100vw + 120px)':'-120px'};transform:${goRight?'scaleX(1)':'scaleX(-1)'};`;
  document.body.appendChild(fish);
  fish.addEventListener('animationend',()=>fish.remove(),{once:true});
}
spawnSwimFish();
setInterval(spawnSwimFish,14000);

// ─── Parallax ─────────────────────────────────────────────────────────────────
let lx=0,ly=0;
document.addEventListener('mousemove',e=>{
  const tx=(e.clientX/window.innerWidth-.5)*18, ty=(e.clientY/window.innerHeight-.5)*14;
  lx+=(tx-lx)*.07; ly+=(ty-ly)*.07;
  document.getElementById('sea-layer').style.transform=`translate(${lx}px,${ly}px)`;
});

// ─── Week navigation ──────────────────────────────────────────────────────────
function navigateWeek(dir){
  const next=weekIdx+dir;
  if(next<0||next>=WEEKS) return;
  weekIdx=next;
  const ws=dateKey(addDays(START,weekIdx*7)), we=dateKey(addDays(START,weekIdx*7+6));
  const cap=we>endKey?endKey:we;
  if(selected<ws||selected>cap) selected=ws;
  renderWeek(dir); renderCards(true);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderWeek(null);
renderCards(false);
renderProgress();
</script>
</body>
</html>
